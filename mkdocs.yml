site_name: Jackson's blog
site_url: https://h-yx-blog.github.io/
repo_url: https://github.com/h-yx-blog/h-yx-blog.github.io
site_author: JacksonHyx

theme:
    name: "material"
    palette:
        primary: "black"
        accent: "deep orange"
    language: "zh"

nav:
  - 本站介绍: index.md
  - 面试题:
      - 基础篇: interview/基础篇.md
      - 集合篇: interview/集合篇.md
      
  - 自己开发中遇到的问题:
       - 遇到的问题: developProblem/开发所遇问题.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - toc:
      permalink: true
  - footnotes
  - meta
  - def_list
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_png
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tilde